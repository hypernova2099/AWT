<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Digital Burnout | Register</title>
  <link rel="stylesheet" href="register.css" />
  <link rel="icon" type="image/jpg" href="logo.png" />
</head>

<body>
  <div class="container">
    <div class="box1">
      <div class="half1">
        <div class="logo"><img src="logo.png" alt="Logo"></div>
        <div class="logocontent">DigitalBurnout</div>
      </div>
      <div class="half2">
        <h1>Create Your Account</h1>
        <form onsubmit="return validatePasswords()">
          <fieldset>
            <input
              type="text"
              name="fullname"
              placeholder="Full Name"
              required />
          </fieldset>

          <fieldset>
            <input
              type="email"
              name="email"
              placeholder="Email"
              required
              pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
              title="Enter a valid email address" />
          </fieldset>

          <fieldset>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Password"
              required
              pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}"
              title="Minimum 8 characters with uppercase, lowercase, number, and special character" />
          </fieldset>

          <fieldset>
            <input
              type="password"
              id="confirm_password"
              name="confirm_password"
              placeholder="Confirm Password"
              required
              title="Please confirm your password" />
          </fieldset>

          <input type="submit" value="Register">
          <div class="signup-text">Already have an account? <a href="LoginForm.html">Login</a></div>
        </form>
      </div>
    </div>
    <div class="box2"></div>
  </div>

  <script>
    function validatePasswords() {
      const pass = document.getElementById('password').value;
      const confirmPass = document.getElementById('confirm_password').value;
      if (pass !== confirmPass) {
        alert("Passwords do not match.");
        return false;
      }
      return true;
    }
  </script>
</body>
</html>
